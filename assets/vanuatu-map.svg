<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 720" role="img" aria-label="Map of the Vanuatu archipelago">
  <title>The Vanuatu archipelago</title>
  <g fill="#C8A23C" fill-opacity="0.17" stroke="#C8A23C" stroke-width="1.8" stroke-opacity="0.85" stroke-linejoin="round">
    <!-- Torba — Torres & Banks (north) -->
    <circle cx="58" cy="78" r="5"/>
    <circle cx="65" cy="92" r="4"/>
    <ellipse cx="136" cy="124" rx="12" ry="11"/>
    <ellipse cx="138" cy="164" rx="12.5" ry="11.5"/>
    <!-- Sanma — Espiritu Santo & Malo -->
    <path d="M80 178 C108 182 116 212 110 250 C106 288 96 322 80 322 C62 322 58 286 58 248 C58 212 58 180 80 178 Z"/>
    <circle cx="106" cy="286" r="7"/>
    <!-- Penama — Ambae, Maewo, Pentecost (east arm) -->
    <ellipse cx="160" cy="256" rx="20" ry="13"/>
    <ellipse cx="202" cy="238" rx="6" ry="22"/>
    <ellipse cx="190" cy="292" rx="9" ry="34"/>
    <!-- Malampa — Malakula, Ambrym, Paama, Lopevi -->
    <path d="M130 290 C156 292 156 322 150 352 C146 372 132 378 122 370 C118 366 122 356 114 350 C106 344 102 350 100 334 C96 312 108 290 130 290 Z"/>
    <ellipse cx="186" cy="334" rx="21" ry="14"/>
    <circle cx="194" cy="350" r="3.2"/>
    <circle cx="205" cy="356" r="2.6"/>
    <!-- Shefa — Epi, Shepherds, Efate -->
    <ellipse cx="206" cy="374" rx="16" ry="11"/>
    <circle cx="220" cy="390" r="3.4"/>
    <circle cx="229" cy="396" r="2.6"/>
    <path d="M206 434 C228 434 236 450 228 466 C220 480 196 480 188 466 C180 452 186 434 206 434 Z"/>
    <!-- Tafea — Erromango, Tanna, Aniwa, Futuna, Aneityum (south) -->
    <path d="M254 522 C278 524 286 546 278 564 C270 580 248 582 240 566 C232 550 232 524 254 522 Z"/>
    <circle cx="309" cy="582" r="2.6"/>
    <path d="M290 584 C309 586 314 604 306 620 C299 632 283 630 279 615 C275 600 274 585 290 584 Z"/>
    <circle cx="356" cy="606" r="3"/>
    <ellipse cx="318" cy="662" rx="12" ry="10"/>
  </g>
</svg>
